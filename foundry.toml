[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib']
solc = '0.8.20'
optimizer = true
optimizer_runs = 200

# Additional settings for deployment and verification
[rpc_endpoints]
xlayer = "https://rpc.xlayer.tech"
xlayer_testnet = "https://testrpc.xlayer.tech/terigon"

[etherscan]
xlayer = { key = "anykey", url = "https://www.okx.com/web3/explorer/xlayer" }
xlayer_testnet = { key = "anykey", url = "https://www.okx.com/web3/explorer/xlayer-test" }
